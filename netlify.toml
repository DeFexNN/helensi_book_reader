[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin.js"
  to = "/admin.js"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
