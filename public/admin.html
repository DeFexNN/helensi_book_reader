<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель — Відтінки болю</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        /* ── ADMIN EXTRAS ── */
        body { background: var(--bg-deep); }

        /* ── LOGIN SCREEN ── */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            font-family: var(--font-display);
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .login-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: var(--font-body);
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
            letter-spacing: 4px;
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-body);
            transition: background 0.2s;
        }
        .login-btn:hover { background: var(--accent-light); }
        .login-error {
            color: var(--accent-light);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* ── ADMIN LAYOUT ── */
        .admin-wrap { display: none; min-height: 100vh; }
        .admin-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .admin-header-title {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-primary);
        }
        .admin-header-title span { color: var(--accent-light); }
        .admin-logout {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .admin-logout:hover { border-color: var(--accent); color: var(--accent-light); }

        .admin-tabs {
            display: flex;
            gap: 0;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
        }
        .admin-tab {
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-body);
        }
        .admin-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .admin-tab:hover { color: var(--text-primary); }

        .admin-content { padding: 32px; max-width: 960px; margin: 0 auto; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* ── section heading ── */
        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .section-heading h2 {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--text-primary);
        }

        /* ── cards/table ── */
        .item-list { display: flex; flex-direction: column; gap: 12px; }
        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .item-card:hover { border-color: var(--border-hover); }
        .item-card-info { flex: 1; min-width: 0; }
        .item-card-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-card-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .item-card-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-icon {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .btn-icon:hover { border-color: var(--accent); color: var(--accent-light); }
        .btn-icon.danger:hover { border-color: #c0392b; color: #e74c3c; }

        .status-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-published { background: rgba(39,174,96,0.15); color: #2ecc71; }
        .status-in_progress { background: rgba(241,196,15,0.15); color: #f1c40f; }

        /* ── btn ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-light); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--border-hover); }

        /* ── Modal / Drawer ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
        }
        .modal-box h3 {
            font-family: var(--font-display);
            font-size: 20px;
            color: var(--text-primary);
            margin-bottom: 24px;
        }
        .modal-close-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }

        /* ── Form ── */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
        .form-select { cursor: pointer; }
        .form-textarea {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

        /* ── WYSIWYG Editor ── */
        .editor-wrap {
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .editor-wrap:focus-within { border-color: var(--accent); }
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 6px 8px;
            background: var(--bg-deep);
            border-bottom: 1px solid var(--border);
        }
        .editor-toolbar button {
            background: none;
            border: none;
            border-radius: 5px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-body);
            font-weight: 600;
            padding: 4px 8px;
            line-height: 1;
            transition: background 0.15s, color 0.15s;
            min-width: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .editor-toolbar button:hover { background: var(--bg-surface); color: var(--text-primary); }
        .editor-toolbar button.active { background: var(--accent); color: #fff; }
        .editor-toolbar .sep {
            width: 1px;
            background: var(--border);
            margin: 2px 4px;
            align-self: stretch;
        }
        .editor-body {
            min-height: 280px;
            max-height: 500px;
            overflow-y: auto;
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.8;
            background: var(--bg-surface);
            outline: none;
        }
        .editor-body p { margin: 0 0 10px; }
        .editor-body p:last-child { margin-bottom: 0; }
        .editor-body em { font-style: italic; color: var(--text-secondary); }
        .editor-body strong { font-weight: 700; }
        .editor-body s { opacity: 0.5; }
        .editor-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 14px;
            color: var(--text-secondary);
            font-style: italic;
            margin: 10px 0;
        }
        .editor-body h3 {
            font-family: var(--font-display);
            font-size: 18px;
            color: var(--accent-light);
            margin: 16px 0 8px;
        }
        .editor-body [data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            pointer-events: none;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 14px;
            color: var(--text-primary);
            z-index: 999;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s var(--ease-out);
            max-width: 320px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(46,204,113,0.4); color: #2ecc71; }
        .toast.error { border-color: rgba(231,76,60,0.4); color: #e74c3c; }

        /* ── Confirm dialog ── */
        .confirm-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .confirm-box h4 { color: var(--text-primary); font-size: 17px; margin-bottom: 10px; }
        .confirm-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .confirm-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #e74c3c; }

        @media (max-width: 640px) {
            .admin-content { padding: 16px; }
            .admin-header, .admin-tabs { padding: 0 16px; }
            .form-row { grid-template-columns: 1fr; }
            .modal-box { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h1>✧ Адмін-панель</h1>
        <p>Введіть код доступу щоб увійти</p>
        <input type="password" class="login-input" id="tokenInput" placeholder="••••••••" autocomplete="current-password">
        <button class="login-btn" id="loginBtn">Увійти</button>
        <div class="login-error" id="loginError">Невірний код. Спробуйте ще раз.</div>
    </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div class="admin-wrap" id="adminWrap">
    <header class="admin-header">
        <div class="admin-header-title">✧ <span>Адмін</span> — Відтінки болю</div>
        <button class="admin-logout" id="logoutBtn">Вийти</button>
    </header>

    <div class="admin-tabs">
        <button class="admin-tab active" data-tab="chapters">📖 Розділи</button>
        <button class="admin-tab" data-tab="characters">👤 Персонажі</button>
    </div>

    <div class="admin-content">

        <!-- ── CHAPTERS TAB ── -->
        <div class="panel active" id="panelChapters">
            <div class="section-heading">
                <h2>Розділи</h2>
                <button class="btn btn-primary" id="addChapterBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Додати розділ
                </button>
            </div>
            <div class="item-list" id="chapterList">
                <p style="color:var(--text-muted); font-size:14px;">Завантаження…</p>
            </div>
        </div>

        <!-- ── CHARACTERS TAB ── -->
        <div class="panel" id="panelCharacters">
            <div class="section-heading">
                <h2>Персонажі</h2>
                <button class="btn btn-primary" id="addCharacterBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Додати персонажа
                </button>
            </div>
            <div class="item-list" id="characterList">
                <p style="color:var(--text-muted); font-size:14px;">Завантаження…</p>
            </div>
        </div>

    </div>
</div>

<!-- ── CHAPTER MODAL ── -->
<div class="modal-overlay" id="chapterModal">
    <div class="modal-box">
        <h3 id="chapterModalTitle">Новий розділ</h3>
        <input type="hidden" id="editChapterNumber" value="">

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Номер</label>
                <input class="form-input" type="number" id="chapterNumber" min="1" placeholder="1">
            </div>
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select class="form-select" id="chapterStatus">
                    <option value="published">Опубліковано</option>
                    <option value="in_progress">В процесі</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Назва</label>
            <input class="form-input" type="text" id="chapterTitle" placeholder="Розділ 1">
        </div>

        <div class="form-group">
            <label class="form-label">Посилання (оригінал Telegraph)</label>
            <input class="form-input" type="url" id="chapterUrl" placeholder="https://telegra.ph/...">
        </div>

        <div class="form-group">
            <label class="form-label">Аудіо URL (Telegram, необов'язково)</label>
            <input class="form-input" type="url" id="chapterAudio" placeholder="https://t.me/...">
        </div>

        <div class="form-group">
            <label class="form-label">Зміст</label>
            <div class="editor-wrap">
                <div class="editor-toolbar" id="editorToolbar">
                    <button type="button" data-cmd="bold" title="Жирний (Ctrl+B)"><b>B</b></button>
                    <button type="button" data-cmd="italic" title="Курсив (Ctrl+I)"><i>I</i></button>
                    <button type="button" data-cmd="strikeThrough" title="Закреслений"><s>S</s></button>
                    <div class="sep"></div>
                    <button type="button" data-cmd="formatBlock" data-val="blockquote" title="Цитата">"</button>
                    <button type="button" data-cmd="formatBlock" data-val="h3" title="Заголовок">H</button>
                    <button type="button" data-cmd="formatBlock" data-val="p" title="Звичайний текст">¶</button>
                    <div class="sep"></div>
                    <button type="button" data-cmd="insertHorizontalRule" title="Роздільник">—</button>
                    <button type="button" id="editorClearFormat" title="Очистити форматування">✕</button>
                </div>
                <div class="editor-body"
                     id="chapterContent"
                     contenteditable="true"
                     data-placeholder="Почніть вводити текст розділу…"></div>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-secondary" id="chapterCancelBtn">Скасувати</button>
            <button class="btn btn-primary" id="chapterSaveBtn">Зберегти</button>
        </div>
    </div>
</div>

<!-- ── CHARACTER MODAL ── -->
<div class="modal-overlay" id="characterModal">
    <div class="modal-box">
        <h3 id="characterModalTitle">Новий персонаж</h3>
        <input type="hidden" id="editCharOriginalName" value="">

        <div class="form-group">
            <label class="form-label">Ім'я</label>
            <input class="form-input" type="text" id="charName" placeholder="Ім'я Прізвище">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Дата народження</label>
                <input class="form-input" type="text" id="charBirthDate" placeholder="17.01">
            </div>
            <div class="form-group">
                <label class="form-label">Вік</label>
                <input class="form-input" type="number" id="charAge" placeholder="22" min="0">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">MBTI</label>
                <input class="form-input" type="text" id="charMbti" placeholder="INTJ" maxlength="4">
            </div>
            <div class="form-group">
                <label class="form-label">Шлях до зображення (img/)</label>
                <input class="form-input" type="text" id="charImage" placeholder="img/arthur.jpg">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-secondary" id="characterCancelBtn">Скасувати</button>
            <button class="btn btn-primary" id="characterSaveBtn">Зберегти</button>
        </div>
    </div>
</div>

<!-- ── CONFIRM MODAL ── -->
<div class="modal-overlay" id="confirmModal">
    <div class="confirm-box">
        <h4 id="confirmTitle">Підтвердження</h4>
        <p id="confirmText">Ви впевнені?</p>
        <div class="confirm-actions">
            <button class="btn btn-secondary" id="confirmCancelBtn">Скасувати</button>
            <button class="btn btn-danger" id="confirmOkBtn">Видалити</button>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script src="/admin.js"></script>
</body>
</html>
